name: Terraform CICD

on:
  workflow_dispatch:
    inputs:
      target-environment:
        description: 'Deployment target'
        required: true
        type: choice
        options:
          - dev
          - int
          - prod

concurrency:
  group: terraform-${{ github.event.inputs.target-environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve-environment:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      working-directory: ${{ steps.set-dir.outputs.working-directory }}
      environment: ${{ steps.set-dir.outputs.environment }}
    steps:
      - name: Map environment to folder
        id: set-dir
        run: |
          case "${{ github.event.inputs.target-environment }}" in
            dev)
              echo "working-directory=Dev" >> "$GITHUB_OUTPUT"
              ;;
            int)
              echo "working-directory=Int" >> "$GITHUB_OUTPUT"
              ;;
            prod)
              echo "working-directory=Prod" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown environment: ${{ github.event.inputs.target-environment }}" >&2
              exit 1
              ;;
          esac
          echo "environment=${{ github.event.inputs.target-environment }}" >> "$GITHUB_OUTPUT"

  terraform-lint:
    name: Lint & validate (${{ github.event.inputs.target-environment }})
    needs: resolve-environment
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ needs.resolve-environment.outputs.working-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform format check
        run: terraform fmt -check -diff -recursive

      - name: Terraform init (validation only)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: Initialize TFLint
        run: tflint --init

      - name: Terraform lint
        run: tflint --format=compact

  terraform-plan:
    name: Plan (${{ github.event.inputs.target-environment }})
    needs: [resolve-environment, terraform-lint]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ needs.resolve-environment.outputs.working-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure Azure credentials
        run: az login --service-principal -u ${{ secrets.AZURE_CLIENT_ID }} -p ${{ secrets.AZURE_CLIENT_SECRET }} --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan -out=tfplan -input=false

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.target-environment }}
          path: ${{ needs.resolve-environment.outputs.working-directory }}/tfplan
          retention-days: 5

  terraform-apply:
    name: Apply (${{ github.event.inputs.target-environment }})
    needs: [resolve-environment, terraform-plan]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-environment.outputs.environment }}
    defaults:
      run:
        working-directory: ${{ needs.resolve-environment.outputs.working-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure Azure credentials
        run: az login --service-principal -u ${{ secrets.AZURE_CLIENT_ID }} -p ${{ secrets.AZURE_CLIENT_SECRET }} --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.target-environment }}
          path: ${{ needs.resolve-environment.outputs.working-directory }}

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan
