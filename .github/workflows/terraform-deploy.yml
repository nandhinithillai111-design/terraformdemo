name: Terraform CICD

on:
  workflow_dispatch:
    inputs:
      target-environment:
        description: 'Deployment target'
        required: true
        type: choice
        options:
          - dev
          - int
          - prod

concurrency:
  group: terraform-${{ github.event.inputs.target-environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve-environment:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      working-directory: ${{ steps.set-dir.outputs.working-directory }}
      environment: ${{ steps.set-dir.outputs.environment }}
    steps:
      - name: Map environment to folder
        id: set-dir
        run: |
          case "${{ github.event.inputs.target-environment }}" in
            dev)
              echo "working-directory=Terraform/Dev" >> "$GITHUB_OUTPUT"
              ;;
            int)
              echo "working-directory=Terraform/Int" >> "$GITHUB_OUTPUT"
              ;;
            prod)
              echo "working-directory=Terraform/Prod" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown environment: ${{ github.event.inputs.target-environment }}" >&2
              exit 1
              ;;
          esac
          echo "environment=${{ github.event.inputs.target-environment }}" >> "$GITHUB_OUTPUT"

  terraform-lint:
    name: Lint & validate (${{ github.event.inputs.target-environment }})
    needs: resolve-environment
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ needs.resolve-environment.outputs.working-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform format check
        run: terraform fmt -check -diff -recursive

      - name: Terraform init (validation only)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: Initialize TFLint
        run: tflint --init

      - name: Terraform lint
        run: tflint --format=compact

  terraform-plan:
    name: Plan (${{ github.event.inputs.target-environment }})
    needs: [resolve-environment, terraform-lint]
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    defaults:
      run:
        working-directory: ${{ needs.resolve-environment.outputs.working-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan -out=tfplan -input=false

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.target-environment }}
          path: ${{ needs.resolve-environment.outputs.working-directory }}/tfplan
          retention-days: 5

  terraform-apply:
    name: Apply (${{ github.event.inputs.target-environment }})
    needs: [resolve-environment, terraform-plan]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: ${{ needs.resolve-environment.outputs.environment }}
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    defaults:
      run:
        working-directory: ${{ needs.resolve-environment.outputs.working-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.target-environment }}
          path: ${{ needs.resolve-environment.outputs.working-directory }}

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Azure login for AKS verification
        if: needs.resolve-environment.outputs.environment == 'int'
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Verify AKS access for Helm CI/CD (int only)
        if: needs.resolve-environment.outputs.environment == 'int'
        run: |
          AKS_CLUSTER=$(terraform output -raw aks_cluster_name)
          AKS_RG=$(terraform output -raw resource_group_name)
          HELM_READY=$(terraform output -raw helm_deploy_ready)

          echo "Helm deploy ready: $HELM_READY"
          echo "CI/CD principal: $(terraform output -raw aks_cicd_principal_id)"
          echo "Verifying AKS access for cluster: $AKS_CLUSTER"

          az aks get-credentials \
            --resource-group "$AKS_RG" \
            --name "$AKS_CLUSTER" \
            --overwrite-existing

          kubectl get nodes
          echo "GitHub Actions SP has AKS access. Run Helm Deploy workflow (int) next."
